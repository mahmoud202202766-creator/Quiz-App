<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Test your JavaScript skills. Challenge your programming knowledge, track your correct answers, and review detailed corrections." />
    <meta name="author" content="Antigravity" />
    <title>JavaScript Skill Challenge - JS Quiz</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="preload" as="image" href="images/5_asfasw112.jpg" />
    <link rel="stylesheet" href="CSS/js.css" />
    <script src="quiz.js" defer></script>
  </head>
  <body>
    <main class="quiz-wrapper">
      <h1 class="main-title">JavaScript Quiz Challenge</h1>
      <div class="quiz-container" role="region" aria-label="Quiz Board">
        <header class="header">
          <p class="q-indicator" aria-live="polite">Question <span class="q-number"></span>:</p>
          <p class="q-progress" aria-label="Progress Tracker"><span class="q-number"></span> of <span class="total"></span></p>
        </header>
        
        <!-- Live-announced region for questions -->
        <div id="quiz-question-box" aria-live="polite">
          <h2 class="q-name" id="question-text"></h2>
          <!-- Native button containers for accessibility -->
          <div class="answer-container" role="radiogroup" aria-labelledby="question-text"></div>
        </div>
        
        <div class="btn-container">
          <button id="back-btn" aria-label="Go back to the previous question">Back</button>
          <button id="next-btn" aria-label="Proceed to the next question">Next</button>
          <button id="submit-btn" class="hidden" aria-label="Submit your quiz answers for evaluation">Submit</button>
          <button id="retake-btn" class="hidden" aria-label="Retake the quiz from the beginning">Retake The Quiz</button>
          <button id="review-btn" class="hidden" aria-label="Review your selected answers alongside correct answers">Review Your Answers</button>
        </div>
        
        <!-- Live region for announcing score dynamically -->
        <div class="score-display hidden" aria-live="assertive">
          <p class="score">
            Your Score Is <span class="score-result" id="score-val"></span> / <span class="total-result"></span>
          </p>
          <p class="score-percentage"></p>
        </div>
      </div>
    </main>
  </body>
</html>
